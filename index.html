<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>Homework FWD</title>
</head>
<body>

    <center>
        <h2>Student Registration Form</h2>

        <form>
            <table border="1" width="500" cellpadding="8" cellspacing="0">
                <tr>
                    <td align="right"><b>Student ID</b></td>
                    <td><input type="text" name="student_id"></td>
                </tr>
                <tr>
                    <td align="right"><b>First Name</b></td>
                    <td><input type="text" name="first_name"></td>
                </tr>
                <tr>
                    <td align="right"><b>Last Name</b></td>
                    <td><input type="text" name="last_name"></td>
                </tr>
                <tr>
                    <td align="right"><b>Gender</b></td>
                    <td>
                        <input type="radio" id="male" name="gender" value="male">
                        <label border="0" for="male">Male</label>
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </td>
                </tr>
                <tr>
                    <td align="right"><b>Date of Birth</b></td>
                    <td><input type="date" name="dob"></td>
                </tr>
                <tr>
                    <td align="right"><b>Email</b></td>
                    <td><input type="email" name="email"></td>
                </tr>
                <tr>
                    <td align="right"><b>Phone</b></td>
                    <td><input type="tel" name="phone"></td>
                </tr>
                <tr>
                    <td align="right"><b>Address</b></td>
                    <td><textarea name="address" rows="4" cols="30"></textarea></td>
                </tr>
                <tr>
                    <td align="right"><b>Course</b></td>
                    <td>
                        <select name="course">
                            <option value="">Select Course</option>
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                            <option value="javascript">JavaScript</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td align="right"><b>Photo</b></td>
                    <td><input type="file" name="photo"></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" value="Save">
                        <input type="reset" value="Clear">
                    </td>
                </tr>
            </table>
        </form>
    </center>

</body>
</html>
